      <rect x="24" y="56" width="312" height="10" rx="5" fill="#eef2ff"/>
      <rect x="24" y="56" width="200" height="10" rx="5" fill="#6366f1"/>
      <text x="24" y="94" font-size="12" fill="#64748b">12 из 18 навыков освоено · 64%</text>
      <rect x="24" y="110" width="120" height="26" rx="13" fill="#eef2ff"/>
      <text x="84" y="127" font-size="11" font-weight="600" fill="#4338ca" text-anchor="middle">Junior · Middle</text>
    </g>

    <g transform="translate(784,18)">
      <rect x="0" y="0" width="400" height="150" rx="18" fill="#4f46e5"/>
      <text x="28" y="44" font-size="18" font-weight="800" fill="#ffffff">AI-коуч в чате</text>
      <text x="28" y="72" font-size="13" fill="#c7d2fe">Диалог, цели, навыки, мотивация.</text>
      <rect x="28" y="92" width="150" height="40" rx="12" fill="#ffffff"/>
      <text x="103" y="117" font-size="13" font-weight="600" fill="#4338ca" text-anchor="middle">Начать</text>
    </g>
